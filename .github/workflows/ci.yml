name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust CLI (cross-lang interop)
        run: cargo build --release -p yakr-cli
        working-directory: rust

      - name: Pytest
        run: uv run pytest packages/ -q --ignore=packages/yakr-testkit/tests/test_phase1_exit.py
        env:
          YAKR_RUST_BIN: ${{ github.workspace }}/rust/target/release/yakr

  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo test (all crates)
        run: cargo test
