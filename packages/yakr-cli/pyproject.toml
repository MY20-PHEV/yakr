[project]
name = "yakr-cli"
version = "0.1.0"
description = "Yakr command-line client"
requires-python = ">=3.12"
dependencies = [
    "yakr-core",
    "yakr-relay",
    "typer>=0.12",
    "httpx>=0.27",
    "rich>=13.0",
]

[project.scripts]
yakr = "yakr_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/yakr_cli"]

[tool.uv.sources]
yakr-core = { workspace = true }
yakr-relay = { workspace = true }
