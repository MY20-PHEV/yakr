[project]
name = "yakr-core"
version = "0.1.0"
description = "Yakr protocol core library"
requires-python = ">=3.12"
dependencies = [
    "cryptography>=43.0",
    "pynacl>=1.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/yakr_core"]
