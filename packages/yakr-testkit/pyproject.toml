[project]
name = "yakr-testkit"
version = "0.1.0"
description = "Yakr test harness and fixtures"
requires-python = ">=3.12"
dependencies = [
    "yakr-core",
    "yakr-relay",
    "yakr-cli",
    "httpx>=0.27",
    "pytest>=8.0",
    "cryptography>=47.0",
    "pynacl>=1.5",
    "cbor2>=5.6",
    "pqcrypto>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/yakr_testkit"]

[tool.uv.sources]
yakr-core = { workspace = true }
yakr-relay = { workspace = true }
yakr-cli = { workspace = true }
