[project]
name = "yakr-relay"
version = "0.1.0"
description = "Yakr relay daemon"
requires-python = ">=3.12"
dependencies = [
    "yakr-core",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]

[project.scripts]
yakr-relay = "yakr_relay.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/yakr_relay"]

[tool.uv.sources]
yakr-core = { workspace = true }
