[project]
name = "yakr-mobile"
version = "0.1.0"
description = "Yakr Android/mobile reference client"
requires-python = ">=3.12"
dependencies = [
    "yakr-core",
    "yakr-cli",
    "httpx>=0.27",
    "qrcode>=8.0",
    "pillow>=11.0",
]

[project.optional-dependencies]
ui = [
    "toga>=0.5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/yakr_mobile"]

[tool.uv.sources]
yakr-core = { workspace = true }
yakr-cli = { workspace = true }
